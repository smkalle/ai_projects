<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini API Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #202124; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #4285f4; color: white; padding: 1rem 2rem; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    main { flex: 1; max-width: 760px; margin: 2rem auto; padding: 0 1rem; width: 100%; }
    .card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); padding: 1.5rem; margin-bottom: 1.5rem; }
    label { display: block; font-weight: 500; margin-bottom: 0.5rem; color: #5f6368; font-size: 0.9rem; }
    select, textarea, button { width: 100%; border-radius: 4px; }
    textarea { padding: 0.75rem; border: 1px solid #dadce0; resize: vertical; min-height: 100px; font-size: 1rem; line-height: 1.5; }
    textarea:focus { outline: none; border-color: #4285f4; }
    select { padding: 0.5rem; border: 1px solid #dadce0; margin-bottom: 1rem; font-size: 0.9rem; }
    button { background: #4285f4; color: white; border: none; padding: 0.75rem; font-size: 1rem; font-weight: 500; cursor: pointer; margin-top: 1rem; transition: background 0.2s; }
    button:hover { background: #3367d6; }
    button:disabled { background: #9aa0a6; cursor: not-allowed; }
    #response-area { background: #f1f3f4; border-radius: 4px; padding: 1rem; font-size: 0.95rem; white-space: pre-wrap; min-height: 80px; line-height: 1.6; }
    #response-area.empty { color: #9aa0a6; font-style: italic; }
    .badge { display: inline-block; background: #e8f0fe; color: #1967d2; border-radius: 4px; padding: 0.15rem 0.5rem; font-size: 0.75rem; margin-bottom: 0.5rem; }
    .error { background: #fce8e6; color: #c5221f; }
    footer { text-align: center; padding: 1rem; color: #9aa0a6; font-size: 0.8rem; }
  </style>
</head>
<body>
  <header>
    <h1>Gemini API Demo</h1>
  </header>

  <main>
    <div class="card">
      <label for="model-select">Model</label>
      <select id="model-select">
        <option value="gemini-3-flash-preview">gemini-3-flash-preview (fast, balanced)</option>
        <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview (complex reasoning)</option>
      </select>

      <label for="prompt-input">Prompt</label>
      <textarea id="prompt-input" placeholder="Ask Gemini anything — e.g. Explain quantum computing in simple terms"></textarea>

      <button id="submit-btn" onclick="submitPrompt()">Generate</button>
    </div>

    <div class="card">
      <div class="badge" id="model-badge">gemini-3-flash-preview</div>
      <div id="response-area" class="empty">Response will appear here…</div>
    </div>
  </main>

  <footer>
    Powered by Gemini API · Deployed on Cloud Run
  </footer>

  <script>
    const API = '/api/generate';

    async function submitPrompt() {
      const btn = document.getElementById('submit-btn');
      const area = document.getElementById('response-area');
      const model = document.getElementById('model-select').value;

      btn.disabled = true;
      btn.textContent = 'Generating…';
      area.className = '';
      area.textContent = 'Loading…';
      document.getElementById('model-badge').textContent = model;
      document.getElementById('model-badge').className = 'badge';

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: document.getElementById('prompt-input').value,
            model: model,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          area.className = 'error';
          area.textContent = 'Error: ' + (data.error || res.statusText);
          document.getElementById('model-badge').className = 'badge error';
          return;
        }

        area.textContent = data.text || '(no text returned)';
      } catch (err) {
        area.className = 'error';
        area.textContent = 'Network error: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate';
      }
    }
  </script>
</body>
</html>
